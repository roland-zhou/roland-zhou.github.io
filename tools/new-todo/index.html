<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>New Todo · TickTick Quick Add</title>
    <style>
        :root {
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --primary: #0066cc;
            --primary-hover: #0052a3;
            --danger: #c0392b;
            --radius: 10px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111827;
                --card-bg: #1f2937;
                --text: #f3f4f6;
                --text-secondary: #9ca3af;
                --border: #374151;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .app {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        @media (max-width: 600px) {
            body { padding: 8px 6px; }
            header { padding: 12px 14px; }
            .body { padding: 12px; gap: 12px; }
            textarea { padding: 10px 12px; }
            .preview { padding: 12px; }
        }

        header {
            padding: 16px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            display: inline-flex;
        }

        .icon-btn:hover {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text);
        }

        @media (prefers-color-scheme: dark) {
            .icon-btn:hover { background: rgba(255, 255, 255, 0.08); }
        }

        .body {
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 1rem;
            font-family: inherit;
            background: var(--card-bg);
            color: var(--text);
            resize: vertical;
            outline: none;
            transition: border-color 0.15s;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        button.primary, button.secondary {
            padding: 10px 18px;
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: background 0.15s, opacity 0.15s;
        }

        button.primary {
            background: var(--primary);
            color: #fff;
        }

        button.primary:hover { background: var(--primary-hover); }
        button.primary:disabled { opacity: 0.5; cursor: not-allowed; }

        button.secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        button.secondary:hover {
            background: rgba(0, 0, 0, 0.04);
        }

        @media (prefers-color-scheme: dark) {
            button.secondary:hover { background: rgba(255, 255, 255, 0.06); }
        }

        .preview {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            background: rgba(0, 102, 204, 0.04);
        }

        .preview h3 {
            font-size: 0.95rem;
            margin-bottom: 12px;
            color: var(--text-secondary);
        }

        .preview .field {
            display: flex;
            gap: 12px;
            padding: 6px 0;
            font-size: 0.9rem;
        }

        .preview .field .key {
            color: var(--text-secondary);
            min-width: 90px;
        }

        .preview .field .val {
            flex: 1;
            word-break: break-word;
        }

        .status {
            font-size: 0.9rem;
            padding: 10px 14px;
            border-radius: var(--radius);
            display: none;
        }

        .status.show { display: block; }
        .status.error { background: rgba(192, 57, 43, 0.1); color: var(--danger); }
        .status.success { background: rgba(34, 139, 34, 0.1); color: #228b22; }
        .status.info { background: rgba(0, 102, 204, 0.1); color: var(--primary); }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.show { display: flex; }

        .modal-content {
            background: var(--card-bg);
            border-radius: var(--radius);
            width: 100%;
            max-width: 480px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 { font-size: 1.1rem; font-weight: 600; }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            line-height: 1;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-group label {
            font-size: 0.85rem;
            font-weight: 500;
        }

        .field-group input,
        .field-group select {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            background: var(--card-bg);
            color: var(--text);
            outline: none;
            font-family: inherit;
        }

        .field-group input:focus,
        .field-group select:focus {
            border-color: var(--primary);
        }

        .help {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .help a { color: var(--primary); }

        .modal-footer {
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid currentColor;
            border-right-color: transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: -2px;
            margin-right: 6px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body>
    <div class="app">
        <header>
            <h1>New Todo · TickTick</h1>
            <button class="icon-btn" id="settings-btn" aria-label="Settings" title="Settings">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
        </header>

        <div class="body">
            <textarea id="input" placeholder="Describe a task in natural language. Example: Remind me to pay rent next Monday at 9am, high priority."></textarea>

            <div class="status" id="status"></div>

            <div class="preview" id="preview" style="display: none;">
                <h3>Preview — please confirm</h3>
                <div id="preview-fields"></div>
                <div class="actions" style="margin-top: 16px;">
                    <button class="secondary" id="cancel-btn">Cancel</button>
                    <button class="primary" id="confirm-btn">Create in TickTick</button>
                </div>
            </div>

            <div class="actions" id="parse-actions">
                <button class="primary" id="parse-btn">Parse with AI</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settings-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="close-btn" id="close-settings">&times;</button>
            </div>
            <div class="modal-body">
                <div class="field-group">
                    <label for="provider">LLM Provider</label>
                    <select id="provider">
                        <option value="openai">OpenAI (ChatGPT)</option>
                        <option value="gemini">Google Gemini</option>
                        <option value="deepseek">DeepSeek</option>
                    </select>
                </div>

                <div class="field-group">
                    <label for="model">Model</label>
                    <select id="model"></select>
                </div>

                <div class="field-group">
                    <label for="llm-key">LLM API Key</label>
                    <input type="password" id="llm-key" placeholder="sk-..." autocomplete="off">
                </div>

                <div class="field-group">
                    <label for="ticktick-token">TickTick Access Token</label>
                    <input type="password" id="ticktick-token" placeholder="OAuth access token" autocomplete="off">
                    <div class="help">
                        Generate via TickTick OAuth at
                        <a href="https://developer.ticktick.com" target="_blank" rel="noopener">developer.ticktick.com</a>.
                    </div>
                </div>

                <div class="help">All keys are stored locally in your browser.</div>
            </div>
            <div class="modal-footer">
                <button class="secondary" id="cancel-settings">Cancel</button>
                <button class="primary" id="save-settings">Save</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'new-todo:settings';

        const PROVIDERS = {
            openai: {
                label: 'OpenAI (ChatGPT)',
                baseUrl: 'https://api.openai.com/v1',
                models: ['gpt-4o-mini', 'gpt-4o', 'gpt-4.1-mini', 'gpt-4.1']
            },
            gemini: {
                label: 'Google Gemini',
                baseUrl: 'https://generativelanguage.googleapis.com/v1beta/openai',
                models: ['gemini-2.5-flash', 'gemini-2.5-pro', 'gemini-2.0-flash']
            },
            deepseek: {
                label: 'DeepSeek',
                baseUrl: 'https://api.deepseek.com/v1',
                models: ['deepseek-chat', 'deepseek-reasoner']
            }
        };

        const PRIORITY_LABELS = { 0: 'None', 1: 'Low', 3: 'Medium', 5: 'High' };

        const DEFAULTS = {
            provider: 'openai',
            model: PROVIDERS.openai.models[0],
            llmKey: '',
            ticktickToken: ''
        };

        const els = {
            input: document.getElementById('input'),
            parseBtn: document.getElementById('parse-btn'),
            parseActions: document.getElementById('parse-actions'),
            preview: document.getElementById('preview'),
            previewFields: document.getElementById('preview-fields'),
            confirmBtn: document.getElementById('confirm-btn'),
            cancelBtn: document.getElementById('cancel-btn'),
            status: document.getElementById('status'),
            settingsBtn: document.getElementById('settings-btn'),
            settingsModal: document.getElementById('settings-modal'),
            closeSettings: document.getElementById('close-settings'),
            cancelSettings: document.getElementById('cancel-settings'),
            saveSettings: document.getElementById('save-settings'),
            provider: document.getElementById('provider'),
            model: document.getElementById('model'),
            llmKey: document.getElementById('llm-key'),
            ticktickToken: document.getElementById('ticktick-token'),
        };

        let settings = loadSettings();
        let pendingTask = null;

        function loadSettings() {
            try {
                return { ...DEFAULTS, ...(JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}) };
            } catch {
                return { ...DEFAULTS };
            }
        }

        function saveSettings(next) {
            settings = next;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
        }

        function refreshModelOptions(provider, selected) {
            const models = PROVIDERS[provider].models;
            els.model.innerHTML = '';
            models.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m;
                opt.textContent = m;
                els.model.appendChild(opt);
            });
            els.model.value = models.includes(selected) ? selected : models[0];
        }

        function openSettings() {
            els.provider.value = settings.provider;
            refreshModelOptions(settings.provider, settings.model);
            els.llmKey.value = settings.llmKey;
            els.ticktickToken.value = settings.ticktickToken;
            els.settingsModal.classList.add('show');
        }

        function closeSettings() {
            els.settingsModal.classList.remove('show');
        }

        function setStatus(msg, kind = 'info') {
            if (!msg) {
                els.status.classList.remove('show');
                els.status.textContent = '';
                return;
            }
            els.status.className = `status show ${kind}`;
            els.status.innerHTML = msg;
        }

        function ensureConfigured() {
            if (!settings.llmKey || !settings.ticktickToken) {
                setStatus('Configure your LLM and TickTick keys in Settings to begin.', 'info');
                openSettings();
                return false;
            }
            return true;
        }

        // ---------- TickTick task tool schema ----------
        const TASK_TOOL = {
            type: 'function',
            function: {
                name: 'create_task',
                description: 'Create a task in TickTick from a natural-language description.',
                parameters: {
                    type: 'object',
                    properties: {
                        title: { type: 'string', description: 'Short task title.' },
                        content: { type: 'string', description: 'Optional notes / details.' },
                        priority: {
                            type: 'integer',
                            enum: [0, 1, 3, 5],
                            description: '0=None, 1=Low, 3=Medium, 5=High.'
                        },
                        isAllDay: { type: 'boolean', description: 'True if no specific time of day.' },
                        startDate: {
                            type: 'string',
                            description: 'ISO 8601 with timezone offset, e.g. 2025-05-06T09:00:00+0800. Omit if unknown.'
                        },
                        dueDate: {
                            type: 'string',
                            description: 'ISO 8601 with timezone offset, e.g. 2025-05-06T18:00:00+0800. Omit if unknown.'
                        },
                        timeZone: {
                            type: 'string',
                            description: 'IANA timezone, e.g. Asia/Shanghai. Defaults to user local zone if known.'
                        }
                    },
                    required: ['title']
                }
            }
        };

        function buildSystemPrompt() {
            const now = new Date();
            const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
            return `You convert natural-language task descriptions into TickTick task parameters.
Current local time: ${now.toString()}
User timezone: ${tz}
Resolve relative dates ("tomorrow", "next Monday", "in 2 hours") against the current local time.
Always call the create_task tool. Keep titles short. Put extra details in content.`;
        }

        async function callLLM(text) {
            const provider = PROVIDERS[settings.provider];
            const url = `${provider.baseUrl}/chat/completions`;
            const body = {
                model: settings.model,
                messages: [
                    { role: 'system', content: buildSystemPrompt() },
                    { role: 'user', content: text }
                ],
                tools: [TASK_TOOL],
                tool_choice: { type: 'function', function: { name: 'create_task' } }
            };

            const res = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${settings.llmKey}`
                },
                body: JSON.stringify(body)
            });

            if (!res.ok) {
                const text = await res.text();
                throw new Error(`LLM error ${res.status}: ${text.slice(0, 300)}`);
            }

            const data = await res.json();
            const call = data.choices?.[0]?.message?.tool_calls?.[0];
            if (!call) throw new Error('LLM did not return a tool call.');

            try {
                return JSON.parse(call.function.arguments);
            } catch (e) {
                throw new Error('Could not parse tool arguments: ' + call.function.arguments);
            }
        }

        async function createTickTickTask(task) {
            const res = await fetch('https://api.ticktick.com/open/v1/task', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${settings.ticktickToken}`
                },
                body: JSON.stringify(task)
            });
            if (!res.ok) {
                const text = await res.text();
                throw new Error(`TickTick error ${res.status}: ${text.slice(0, 300)}`);
            }
            return res.json();
        }

        function formatDateTime(iso, timeZone) {
            if (!iso) return iso;
            const d = new Date(iso);
            if (isNaN(d)) return iso;
            try {
                const opts = {
                    year: 'numeric', month: '2-digit', day: '2-digit',
                    hour: '2-digit', minute: '2-digit',
                    hourCycle: 'h23',
                    timeZoneName: 'short'
                };
                if (timeZone) opts.timeZone = timeZone;
                const parts = new Intl.DateTimeFormat('en-CA', opts).formatToParts(d);
                const get = t => parts.find(p => p.type === t)?.value || '';
                return `${get('year')}-${get('month')}-${get('day')} ${get('hour')}:${get('minute')} ${get('timeZoneName')}`.trim();
            } catch {
                return iso;
            }
        }

        function renderPreview(task) {
            els.previewFields.innerHTML = '';
            const fields = [
                ['Title', task.title],
                ['Notes', task.content],
                ['Priority', task.priority != null ? `${PRIORITY_LABELS[task.priority] ?? task.priority}` : null],
                ['All Day', task.isAllDay != null ? (task.isAllDay ? 'Yes' : 'No') : null],
                ['Start', formatDateTime(task.startDate, task.timeZone)],
                ['Due', formatDateTime(task.dueDate, task.timeZone)],
                ['Timezone', task.timeZone],
            ];
            for (const [k, v] of fields) {
                if (v == null || v === '') continue;
                const row = document.createElement('div');
                row.className = 'field';
                const key = document.createElement('div');
                key.className = 'key';
                key.textContent = k;
                const val = document.createElement('div');
                val.className = 'val';
                val.textContent = v;
                row.append(key, val);
                els.previewFields.appendChild(row);
            }
            els.preview.style.display = 'block';
            els.parseActions.style.display = 'none';
        }

        function resetUI() {
            els.preview.style.display = 'none';
            els.parseActions.style.display = 'flex';
            pendingTask = null;
        }

        // ---------- Event wiring ----------
        els.settingsBtn.addEventListener('click', openSettings);
        els.closeSettings.addEventListener('click', closeSettings);
        els.cancelSettings.addEventListener('click', closeSettings);
        els.settingsModal.addEventListener('click', e => {
            if (e.target === els.settingsModal) closeSettings();
        });

        els.provider.addEventListener('change', () => {
            refreshModelOptions(els.provider.value, els.model.value);
        });

        els.saveSettings.addEventListener('click', () => {
            saveSettings({
                provider: els.provider.value,
                model: els.model.value,
                llmKey: els.llmKey.value.trim(),
                ticktickToken: els.ticktickToken.value.trim()
            });
            closeSettings();
            setStatus('Settings saved.', 'success');
            setTimeout(() => setStatus(''), 2000);
        });

        els.parseBtn.addEventListener('click', async () => {
            const text = els.input.value.trim();
            if (!text) {
                setStatus('Type a task description first.', 'error');
                return;
            }
            if (!ensureConfigured()) return;

            setStatus('<span class="spinner"></span>Parsing with ' + settings.model + '...', 'info');
            els.parseBtn.disabled = true;
            try {
                pendingTask = await callLLM(text);
                setStatus('');
                renderPreview(pendingTask);
            } catch (e) {
                setStatus(e.message, 'error');
            } finally {
                els.parseBtn.disabled = false;
            }
        });

        els.cancelBtn.addEventListener('click', resetUI);

        els.confirmBtn.addEventListener('click', async () => {
            if (!pendingTask) return;
            els.confirmBtn.disabled = true;
            els.cancelBtn.disabled = true;
            setStatus('<span class="spinner"></span>Creating task in TickTick...', 'info');
            try {
                const result = await createTickTickTask(pendingTask);
                setStatus(`Created: ${result.title || pendingTask.title}`, 'success');
                els.input.value = '';
                resetUI();
            } catch (e) {
                setStatus(e.message, 'error');
            } finally {
                els.confirmBtn.disabled = false;
                els.cancelBtn.disabled = false;
            }
        });

        // First-run hint
        if (!settings.llmKey || !settings.ticktickToken) {
            setStatus('Open Settings to configure your LLM and TickTick keys.', 'info');
        }
    </script>
</body>

</html>
